<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>GIF-кнопка — настройки</title>
    <link rel="stylesheet" href="../../static/css/sdpi.css">
    <style>
        #preview {
            width: 126px;
            height: 126px;
            object-fit: contain;
            background: #1a1a1a;
            border-radius: 8px;
            border: 1px solid #444;
        }

        .preview-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
        }
    </style>
</head>

<body>
    <div class="sdpi-wrapper" style="display: none">
        <div class="sdpi-heading">GIF на кнопке</div>

        <div class="sdpi-item">
            <div class="sdpi-item-label">Файл GIF</div>
            <input id="gifFile" class="sdpi-item-value" type="file" accept=".gif,image/gif">
        </div>

        <div class="sdpi-item">
            <div class="sdpi-item-label">или URL</div>
            <input id="gifUrl" class="sdpi-item-value" type="url" placeholder="https://example.com/image.gif">
        </div>

        <div class="sdpi-item">
            <div class="sdpi-item-label">FPS (1–30)</div>
            <input id="fps" class="sdpi-item-value" type="number" min="1" max="30" value="15">
        </div>

        <div class="sdpi-item">
            <div class="sdpi-item-label">Подпись</div>
            <input id="title" class="sdpi-item-value" type="text" placeholder="Необязательно">
        </div>

        <div class="sdpi-item">
            <div class="sdpi-item-label">Превью</div>
            <div class="sdpi-item-value preview-wrap">
                <img id="preview" alt="preview" src="../../static/default.jpg">
                <button id="clear" class="sdpi-item-value" type="button">Очистить</button>
            </div>
        </div>

        <div class="sdpi-item">
            <div class="sdpi-item-label">Совет</div>
            <div class="sdpi-item-value" style="font-size: 11px; opacity: 0.85; line-height: 1.4;">
                Лучше GIF до 1–2 МБ. На физической кнопке D6 анимация идёт через снимки кадров.
            </div>
        </div>
    </div>
    <script src="../utils/common.js"></script>
    <script src="../utils/action.js"></script>
    <script src="index.js"></script>
</body>

</html>
