<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Открыть URL — настройки</title>
    <link rel="stylesheet" href="../../static/css/sdpi.css">
</head>

<body>
    <div class="sdpi-wrapper" style="display: none">
        <div class="sdpi-heading">Открыть URL</div>
        <div class="sdpi-item">
            <div class="sdpi-item-label">Адрес</div>
            <input id="url" class="sdpi-item-value" type="url" placeholder="https://example.com">
        </div>
        <div class="sdpi-item">
            <div class="sdpi-item-label">Подсказка</div>
            <div class="sdpi-item-value" style="font-size: 11px; opacity: 0.8;">
                Укажите полный URL с https://
            </div>
        </div>
    </div>
    <script src="../utils/common.js"></script>
    <script src="../utils/action.js"></script>
    <script src="index.js"></script>
</body>

</html>
